<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TodoFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --border: #2a2a3a;
      --accent: #7c6aff;
      --accent2: #ff6a8a;
      --accent3: #6affd4;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --done: #3a3a4a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,106,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.25;
    }
    .orb-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; right: -150px; animation: drift1 12s ease-in-out infinite alternate; }
    .orb-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; left: -100px; animation: drift2 10s ease-in-out infinite alternate; }

    @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(-40px, 40px); } }
    @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(30px, -30px); } }

    /* Layout */
    .container {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 60px 24px 100px;
    }

    /* Header */
    header {
      margin-bottom: 52px;
      animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 18px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(120deg, var(--text) 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 0;
      margin-bottom: 32px;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      animation: slideDown 0.6s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .stat {
      flex: 1;
      padding: 14px 20px;
      background: var(--surface);
      text-align: center;
      border-right: 1px solid var(--border);
      transition: background 0.2s;
    }
    .stat:last-child { border-right: none; }
    .stat:hover { background: var(--surface2); }

    .stat-val {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-val.total { color: var(--text); }
    .stat-val.pending { color: var(--accent); }
    .stat-val.done-count { color: var(--accent3); }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Input area */
    .input-wrap {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
      animation: slideDown 0.6s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    #taskInput {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #taskInput::placeholder { color: var(--muted); }
    #taskInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,255,0.15);
    }

    .add-btn {
      background: linear-gradient(135deg, var(--accent), #9b8aff);
      border: none;
      border-radius: 12px;
      padding: 14px 22px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .add-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,106,255,0.35); }
    .add-btn:active { transform: translateY(0); }

    /* Filter tabs */
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      animation: slideDown 0.6s 0.25s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 16px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* Todo list */
    #todoList {
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: slideDown 0.6s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s, opacity 0.3s;
      animation: itemIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .todo-item:hover {
      transform: translateX(4px);
      border-color: rgba(124,106,255,0.4);
      box-shadow: -4px 0 0 var(--accent);
    }

    .todo-item.done-item {
      opacity: 0.45;
      border-color: var(--done);
    }
    .todo-item.done-item:hover {
      box-shadow: -4px 0 0 var(--accent3);
      border-color: rgba(106,255,212,0.3);
      opacity: 0.65;
    }

    @keyframes itemIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Checkbox */
    .check-btn {
      width: 22px; height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: grid; place-items: center;
      flex-shrink: 0;
      transition: all 0.2s;
      color: transparent;
      font-size: 12px;
    }
    .check-btn:hover { border-color: var(--accent3); background: rgba(106,255,212,0.1); }
    .todo-item.done-item .check-btn {
      background: var(--accent3);
      border-color: var(--accent3);
      color: #0a0a0f;
    }

    .todo-text {
      flex: 1;
      font-size: 14px;
      line-height: 1.4;
      color: var(--text);
      transition: color 0.2s;
    }
    .todo-item.done-item .todo-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    /* Edit input */
    .edit-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 4px 10px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      outline: none;
    }

    .todo-id {
      font-size: 10px;
      color: var(--muted);
      opacity: 0.5;
      font-weight: 500;
      flex-shrink: 0;
    }

    .action-btns { display: flex; gap: 6px; flex-shrink: 0; }

    .icon-btn {
      width: 30px; height: 30px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      display: grid; place-items: center;
      font-size: 14px;
      transition: all 0.2s;
    }
    .icon-btn:hover { color: var(--text); border-color: var(--accent); background: rgba(124,106,255,0.1); }
    .icon-btn.delete:hover { color: var(--accent2); border-color: var(--accent2); background: rgba(255,106,138,0.1); }
    .icon-btn.save:hover { color: var(--accent3); border-color: var(--accent3); background: rgba(106,255,212,0.1); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
    .empty-text { font-size: 13px; letter-spacing: 0.05em; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 22px;
      font-size: 13px;
      color: var(--text);
      z-index: 100;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--accent3); color: var(--accent3); }
    .toast.error { border-color: var(--accent2); color: var(--accent2); }

    /* API status dot */
    .api-status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: var(--muted);
      margin-top: 10px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: none;
    }
    .dot.online { background: var(--accent3); animation: pulse 2s infinite; }
    .dot.offline { background: var(--accent2); }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(106,255,212,0.4); }
      50% { box-shadow: 0 0 0 5px rgba(106,255,212,0); }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 24px;
      animation: slideDown 0.6s 0.28s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .progress-bar {
      height: 4px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent3));
      border-radius: 4px;
      transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      width: 0%;
    }
  </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <h1>TodoFlow</h1>
    </div>
    <p class="subtitle">Task management · REST API connected</p>
    <div class="api-status">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Connecting to API...</span>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-val total" id="totalCount">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-val pending" id="pendingCount">0</div>
      <div class="stat-label">Pending</div>
    </div>
    <div class="stat">
      <div class="stat-val done-count" id="doneCount">0</div>
      <div class="stat-label">Done</div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-wrap">
    <input id="taskInput" type="text" placeholder="Add a new task..." autocomplete="off"/>
    <button class="add-btn" onclick="addTodo()">+ Add</button>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span>Progress</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <!-- List -->
  <div id="todoList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost:3000';
  let todos = [];
  let filter = 'all';
  let editingId = null;

  // ─── API calls ────────────────────────────────────────────
  async function apiFetch(path, opts = {}) {
    const res = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json' },
      ...opts
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }

  async function loadTodos() {
    try {
      todos = await apiFetch('/todos');
      setStatus(true);
      render();
    } catch {
      setStatus(false);
      showToast('Cannot reach API — showing demo data', 'error');
      todos = [
        { id: 1, task: 'Connect to your Node.js backend', done: false },
        { id: 2, task: 'Run: npm start in project folder', done: false },
        { id: 3, task: 'Build the CI/CD pipeline 🚀', done: false },
      ];
      render();
    }
  }

  async function addTodo() {
    const input = document.getElementById('taskInput');
    const task = input.value.trim();
    if (!task) return;
    try {
      const newTodo = await apiFetch('/todos', { method: 'POST', body: JSON.stringify({ task }) });
      todos.push(newTodo);
      input.value = '';
      render();
      showToast('Task added ✓', 'success');
    } catch {
      showToast('Failed to add task', 'error');
    }
  }

  async function toggleTodo(id) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    try {
      const updated = await apiFetch(`/todos/${id}`, {
        method: 'PUT',
        body: JSON.stringify({ done: !todo.done })
      });
      Object.assign(todo, updated);
      render();
    } catch {
      showToast('Update failed', 'error');
    }
  }

  async function deleteTodo(id) {
    try {
      await apiFetch(`/todos/${id}`, { method: 'DELETE' });
      todos = todos.filter(t => t.id !== id);
      render();
      showToast('Task removed', 'success');
    } catch {
      showToast('Delete failed', 'error');
    }
  }

  async function saveEdit(id) {
    const input = document.getElementById(`edit-${id}`);
    const task = input.value.trim();
    if (!task) return;
    try {
      const updated = await apiFetch(`/todos/${id}`, {
        method: 'PUT',
        body: JSON.stringify({ task })
      });
      const todo = todos.find(t => t.id === id);
      Object.assign(todo, updated);
      editingId = null;
      render();
      showToast('Task updated ✓', 'success');
    } catch {
      showToast('Update failed', 'error');
    }
  }

  // ─── Render ───────────────────────────────────────────────
  function render() {
    const filtered = todos.filter(t => {
      if (filter === 'pending') return !t.done;
      if (filter === 'done') return t.done;
      return true;
    });

    // Stats
    const total = todos.length;
    const done = todos.filter(t => t.done).length;
    const pending = total - done;
    document.getElementById('totalCount').textContent = total;
    document.getElementById('pendingCount').textContent = pending;
    document.getElementById('doneCount').textContent = done;

    const pct = total ? Math.round((done / total) * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = pct + '%';

    const list = document.getElementById('todoList');

    if (!filtered.length) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">◎</div><div class="empty-text">No tasks here</div></div>`;
      return;
    }

    list.innerHTML = filtered.map(t => {
      const isEditing = editingId === t.id;
      return `
      <div class="todo-item ${t.done ? 'done-item' : ''}" id="item-${t.id}">
        <button class="check-btn" onclick="toggleTodo(${t.id})">✓</button>
        ${isEditing
          ? `<input class="edit-input" id="edit-${t.id}" value="${t.task.replace(/"/g,'&quot;')}"
               onkeydown="if(event.key==='Enter')saveEdit(${t.id});if(event.key==='Escape'){editingId=null;render();}"
             />`
          : `<span class="todo-text">${escHtml(t.task)}</span>`
        }
        <span class="todo-id">#${t.id}</span>
        <div class="action-btns">
          ${isEditing
            ? `<button class="icon-btn save" onclick="saveEdit(${t.id})" title="Save">✓</button>`
            : `<button class="icon-btn" onclick="startEdit(${t.id})" title="Edit">✎</button>`
          }
          <button class="icon-btn delete" onclick="deleteTodo(${t.id})" title="Delete">✕</button>
        </div>
      </div>`;
    }).join('');

    if (editingId !== null) {
      const el = document.getElementById(`edit-${editingId}`);
      if (el) { el.focus(); el.select(); }
    }
  }

  function startEdit(id) { editingId = id; render(); }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ─── Status & Toast ───────────────────────────────────────
  function setStatus(online) {
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    dot.className = 'dot ' + (online ? 'online' : 'offline');
    txt.textContent = online ? 'API connected · localhost:3000' : 'API offline · demo mode';
  }

  let toastTimer;
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.className = 'toast', 2800);
  }

  // ─── Enter key ────────────────────────────────────────────
  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTodo();
  });

  // ─── Init ─────────────────────────────────────────────────
  loadTodos();
</script>
</body>
</html>
